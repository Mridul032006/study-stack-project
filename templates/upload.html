{% extends "base.html" %}
{% block title %}Upload Notes | StudyStack{% endblock %}
{% block content %}

<section class="upload-container">

    <div class="upload-card">

        <h1>Upload Your Notes</h1>
        <p class="subtitle">Share your study material</p>

        <form method="POST" enctype="multipart/form-data">

            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" placeholder="Enter title" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" placeholder="Enter description" required></textarea>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" placeholder="Enter subject" required>
            </div>

            <div class="form-group">
                <label>Upload File</label>
                <input type="file" name="file" required>
            </div>

            <button class="btn primary full">Upload</button>

        </form>

    </div>

</section>

{% endblock %}
